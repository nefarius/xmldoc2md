name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .Net SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Build
        run: dotnet build -c Release

      - name: Test
        env:
          # Prevent DiffEngine from attempting to launch a GUI diff tool on snapshot mismatches.
          # Without this, a Verify mismatch would hang waiting for a GUI process that never starts.
          DiffEngine_Disabled: true
        run: dotnet test -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: coverage/

      - name: Upload Verify received files on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verify-received
          path: "**/*.received.*"
